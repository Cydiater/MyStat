name: MyStat-iOS
options:
  bundleIdPrefix: com.cydiater
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: false
    DEVELOPMENT_TEAM: VK379AZANR

targets:
  MyStat-iOS:
    type: application
    platform: iOS
    sources:
      - path: MyStat-iOS
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cydiater.MyStat-iOS
        INFOPLIST_FILE: MyStat-iOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: MyStat-iOS/MyStat-iOS.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: MyStatWidgetExtension

  MyStatWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: MyStatWidget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cydiater.MyStat-iOS.MyStatWidget
        INFOPLIST_FILE: MyStatWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: MyStatWidget/MyStatWidget.entitlements
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
